name: CI - Validação de Código
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Forçamos a instalação manual para garantir que os módulos existam para o teste
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios

      - name: Syntax Check (Lint)
        run: node --check monitor.js monitor_harry.js

      - name: Smoke Test (Validação de Inicialização)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # O script vai tentar rodar, carregar os módulos e o Node vai validar se tudo existe
        run: node --check monitor.js monitor_harry.js && echo "Sintaxe OK"